services:
  - type: web
    name: ai-assistant-backend
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: ai_assistant
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: AI Assistant
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_PAGE_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_API_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: EMS_API_URL
        sync: false
      - key: EMS_API_KEY
        sync: false
      - key: META_VERIFY_TOKEN
        value: mitra_verify_token